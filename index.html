<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>บันทึกรายรับรายจ่าย — China Trip</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#A6362B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="China Trip" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<style>
  :root{
    --paper:#F6F1E7;
    --card:#FFFFFF;
    --ink:#2B2926;
    --ink-soft:#6B655C;
    --seal:#A6362B;
    --seal-dark:#7C2721;
    --gold:#B8912B;
    --income:#4C7A54;
    --expense:#A6362B;
    --border:#E4DCC9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans Thai','Inter',-apple-system,sans-serif;
    padding:32px 16px 80px;
  }
  .wrap{max-width:520px;margin:0 auto;}
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:24px;
  }
  header h1{
    font-size:20px;
    font-weight:700;
    margin:0;
    letter-spacing:0.2px;
  }
  header p{
    margin:2px 0 0;
    font-size:13px;
    color:var(--ink-soft);
  }
  .seal{
    width:64px;height:64px;border-radius:50%;
    border:3px solid var(--seal);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;
    color:var(--seal);
    font-weight:700;
    transform:rotate(-4deg);
    flex-shrink:0;
    background:rgba(166,54,43,0.04);
  }
  .seal span:first-child{font-size:9px;letter-spacing:1px;}
  .seal span:last-child{font-size:12px;}

  .balance-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
  }
  .balance-item{text-align:left;}
  .balance-item.right{text-align:right;}
  .balance-label{font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .balance-value{font-size:20px;font-weight:700;}
  .balance-value.income{color:var(--income);}
  .balance-value.expense{color:var(--expense);}
  .balance-total{
    grid-column:1/-1;
    text-align:center;
    padding-top:14px;
    margin-top:14px;
    border-top:1px dashed var(--border);
  }
  .balance-total .balance-value{font-size:28px;color:var(--gold);}

  form{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
    margin-bottom:24px;
  }
  .type-toggle{
    display:flex;gap:8px;margin-bottom:14px;
  }
  .type-toggle button{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    font-size:14px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .type-toggle button.active[data-type="income"]{
    background:rgba(76,122,84,0.12);
    border-color:var(--income);
    color:var(--income);
  }
  .type-toggle button.active[data-type="expense"]{
    background:rgba(166,54,43,0.1);
    border-color:var(--expense);
    color:var(--expense);
  }
  label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin:12px 0 4px;
  }
  input, select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--paper);
    font-size:15px;
    color:var(--ink);
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--gold);
  }
  .submit-btn{
    margin-top:18px;
    width:100%;
    padding:13px;
    border-radius:10px;
    border:none;
    background:var(--ink);
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .submit-btn:active{transform:scale(0.99);}
  .status{
    text-align:center;
    font-size:13px;
    margin-top:10px;
    min-height:16px;
    color:var(--ink-soft);
  }

  .phase-summary{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:4px;
    margin-bottom:20px;
  }
  .phase-chip{
    flex-shrink:0;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 14px;
    cursor:pointer;
    min-width:120px;
  }
  .phase-chip.active{
    border-color:var(--gold);
    background:rgba(184,145,43,0.08);
  }
  .phase-chip .phase-name{font-size:12px;color:var(--ink-soft);margin-bottom:4px;white-space:nowrap;}
  .phase-chip .phase-net{font-size:15px;font-weight:700;}
  .phase-chip .phase-net.pos{color:var(--gold);}
  .phase-chip .phase-net.neg{color:var(--expense);}

  .cat-tree{
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    background:var(--paper);
  }
  .cat-main{
    display:flex;align-items:center;gap:8px;
    padding:6px 0;
    font-size:14px;font-weight:600;
    cursor:pointer;
  }
  .cat-main input{width:auto;padding:0;}
  .cat-subs{
    display:none;
    margin:0 0 6px 26px;
    flex-wrap:wrap;
    gap:6px 14px;
  }
  .cat-subs.open{display:flex;}
  .cat-sub{
    display:flex;align-items:center;gap:6px;
    font-size:13px;color:var(--ink-soft);
    cursor:pointer;
  }
  .cat-sub input{width:auto;padding:0;}
  .cat-custom{
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed var(--border);
  }
  .cat-custom input{margin-top:4px;}

  .list-title{font-size:14px;font-weight:700;margin:0 0 10px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:baseline;}
  .list-title .sub{font-size:12px;font-weight:400;color:var(--ink-soft);}
  .entry{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 4px;
    border-bottom:1px solid var(--border);
  }
  .entry:last-child{border-bottom:none;}
  .entry-left{display:flex;flex-direction:column;}
  .entry-cat{font-size:14px;font-weight:600;}
  .entry-meta{font-size:12px;color:var(--ink-soft);}
  .entry-amount{font-size:15px;font-weight:700;}
  .entry-amount.income{color:var(--income);}
  .entry-amount.expense{color:var(--expense);}
  .empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:24px 0;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>บันทึกรายรับรายจ่าย</h1>
      <p>ทริปเรียนต่อประเทศจีน</p>
    </div>
    <div class="seal">
      <span>รวม</span>
      <span id="sealTotal">฿0</span>
    </div>
  </header>

  <div class="balance-card">
    <div class="balance-item">
      <div class="balance-label">รายรับ</div>
      <div class="balance-value income" id="totalIncome">฿0</div>
    </div>
    <div class="balance-item right">
      <div class="balance-label">รายจ่าย</div>
      <div class="balance-value expense" id="totalExpense">฿0</div>
    </div>
  </div>

  <form id="entryForm">
    <div class="type-toggle">
      <button type="button" data-type="income" class="active">รายรับ</button>
      <button type="button" data-type="expense">รายจ่าย</button>
    </div>

    <label for="date">วันที่</label>
    <input type="date" id="date" required />

    <label for="itemName">ซื้ออะไร / รายการ</label>
    <input type="text" id="itemName" placeholder="เช่น โดนัท, ตั๋วรถไฟ, ค่าหอเดือนนี้" required />

    <label for="category" id="categoryLabel">หมวดหมู่</label>
    <input type="text" id="category" placeholder="เช่น เงินติดตัว, ทุนการศึกษา" />

    <div class="cat-tree" id="categoryTree" style="display:none;"></div>

    <label for="phase">ช่วงเวลา</label>
    <input type="text" id="phase" list="phaseOptions" placeholder="เช่น เตรียมตัวก่อนไป, เดือนที่ 1" required />
    <datalist id="phaseOptions">
      <option value="เตรียมตัวก่อนไป"></option>
      <option value="เดือนที่ 1"></option>
      <option value="เดือนที่ 2"></option>
      <option value="เดือนที่ 3"></option>
    </datalist>

    <label for="amount">จำนวนเงิน (บาท)</label>
    <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" required />

    <label for="note">โน้ตเพิ่มเติม (ไม่บังคับ)</label>
    <input type="text" id="note" placeholder="รายละเอียดเสริม เช่น ซื้อกับใคร" />

    <button type="submit" class="submit-btn">บันทึกรายการ</button>
    <div class="status" id="status"></div>
  </form>

  <div class="phase-summary" id="phaseSummary"></div>

  <div class="list-title"><span>รายการ</span><span class="sub" id="listSub"></span></div>
  <div id="entryList"><div class="empty">กำลังโหลด...</div></div>

</div>

<script>
  // วาง Web app URL จาก Google Apps Script ที่นี่
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwTlKyeNWZMuq8sO-ujkoNh2FlRrxF5lHpKefxH01QEYIkCojZdAUiwm5fPUAyI82tO/exec";

  const EXPENSE_CATEGORIES = [
    { name: "ค่าที่พัก", subs: [] },
    { name: "ค่าเดินทาง", subs: [] },
    { name: "ค่ากิน", subs: ["ข้าว", "น้ำ", "ขนม"] },
    { name: "ค่าคอนเทนต์", subs: [] }
  ];

  const categoryTreeEl = document.getElementById("categoryTree");
  const categoryTextEl = document.getElementById("category");
  const categoryLabelEl = document.getElementById("categoryLabel");

  categoryTreeEl.innerHTML = EXPENSE_CATEGORIES.map((cat, i) => `
    <div>
      <label class="cat-main">
        <input type="checkbox" class="cat-main-check" data-cat="${cat.name}" data-idx="${i}" />
        ${cat.name}
      </label>
      ${cat.subs.length ? `
        <div class="cat-subs" id="subs-${i}">
          ${cat.subs.map(s => `
            <label class="cat-sub">
              <input type="checkbox" class="cat-sub-check" data-cat="${cat.name}" data-sub="${s}" />
              ${s}
            </label>
          `).join("")}
        </div>` : ""}
    </div>
  `).join("") + `
    <div class="cat-custom">
      <label style="font-size:13px;color:var(--ink-soft);">อื่นๆ (ไม่บังคับ)</label>
      <input type="text" id="categoryCustom" placeholder="พิมพ์หมวดหมู่เพิ่มเติม" />
    </div>
  `;

  categoryTreeEl.querySelectorAll(".cat-main-check").forEach(chk => {
    chk.addEventListener("change", () => {
      const idx = chk.dataset.idx;
      const subsEl = document.getElementById("subs-" + idx);
      if(subsEl) subsEl.classList.toggle("open", chk.checked);
      if(!chk.checked && subsEl){
        subsEl.querySelectorAll("input").forEach(s => s.checked = false);
      }
    });
  });

  function updateCategoryFieldVisibility(){
    if(currentType === "expense"){
      categoryTextEl.style.display = "none";
      categoryTextEl.required = false;
      categoryTreeEl.style.display = "block";
      categoryLabelEl.textContent = "หมวดหมู่ (เลือกได้หลายรายการ)";
    }else{
      categoryTextEl.style.display = "block";
      categoryTextEl.required = true;
      categoryTreeEl.style.display = "none";
      categoryLabelEl.textContent = "หมวดหมู่";
    }
  }

  function collectExpenseCategories(){
    const parts = [];
    EXPENSE_CATEGORIES.forEach(cat => {
      const mainChecked = categoryTreeEl.querySelector(`.cat-main-check[data-cat="${cat.name}"]`).checked;
      if(!mainChecked) return;
      const subChecks = [...categoryTreeEl.querySelectorAll(`.cat-sub-check[data-cat="${cat.name}"]`)].filter(s => s.checked);
      if(subChecks.length){
        parts.push(`${cat.name} (${subChecks.map(s => s.dataset.sub).join(", ")})`);
      }else{
        parts.push(cat.name);
      }
    });
    const custom = document.getElementById("categoryCustom").value.trim();
    if(custom) parts.push(custom);
    return parts.join(", ");
  }
  const statusEl = document.getElementById("status");
  const listEl = document.getElementById("entryList");
  const toggleBtns = document.querySelectorAll(".type-toggle button");
  let currentType = "income";

  document.getElementById("date").valueAsDate = new Date();

  toggleBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      toggleBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentType = btn.dataset.type;
      updateCategoryFieldVisibility();
    });
  });
  updateCategoryFieldVisibility();

  function fmt(n){
    return "฿" + Number(n || 0).toLocaleString("th-TH", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  async function loadEntries(){
    if(GAS_URL.includes("PASTE_YOUR")){
      listEl.innerHTML = '<div class="empty">ยังไม่ได้เชื่อม Google Sheet — วาง URL ใน GAS_URL ก่อน</div>';
      return;
    }
    try{
      const res = await fetch(GAS_URL);
      const data = await res.json();
      if(!data.ok) throw new Error(data.error || "โหลดข้อมูลไม่สำเร็จ");
      renderEntries(data.rows || []);
    }catch(err){
      listEl.innerHTML = '<div class="empty">โหลดข้อมูลไม่สำเร็จ ลองรีเฟรชอีกครั้ง</div>';
    }
  }

  let allRows = [];
  let activePhase = "ALL";

  function netOf(rows){
    let income = 0, expense = 0;
    rows.forEach(r => {
      if(r.type === "income") income += Number(r.amount) || 0;
      else expense += Number(r.amount) || 0;
    });
    return { income, expense, net: income - expense };
  }

  function renderEntries(rows){
    allRows = rows;
    renderPhaseSummary();
    renderList();
  }

  function renderPhaseSummary(){
    const summaryEl = document.getElementById("phaseSummary");
    const phases = [...new Set(allRows.map(r => r.phase || "ไม่ระบุ"))];
    const allTotal = netOf(allRows);

    let html = `
      <div class="phase-chip ${activePhase === "ALL" ? "active" : ""}" data-phase="ALL">
        <div class="phase-name">ทั้งทริป</div>
        <div class="phase-net ${allTotal.net >= 0 ? "pos" : "neg"}">${fmt(allTotal.net)}</div>
      </div>`;
    html += phases.map(p => {
      const t = netOf(allRows.filter(r => (r.phase || "ไม่ระบุ") === p));
      return `
        <div class="phase-chip ${activePhase === p ? "active" : ""}" data-phase="${p}">
          <div class="phase-name">${p}</div>
          <div class="phase-net ${t.net >= 0 ? "pos" : "neg"}">${fmt(t.net)}</div>
        </div>`;
    }).join("");

    summaryEl.innerHTML = html;
    summaryEl.querySelectorAll(".phase-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        activePhase = chip.dataset.phase;
        renderPhaseSummary();
        renderList();
      });
    });
  }

  function renderList(){
    const filtered = activePhase === "ALL"
      ? allRows
      : allRows.filter(r => (r.phase || "ไม่ระบุ") === activePhase);

    const t = netOf(filtered);
    document.getElementById("totalIncome").textContent = fmt(t.income);
    document.getElementById("totalExpense").textContent = fmt(t.expense);
    document.getElementById("sealTotal").textContent = fmt(t.net);
    document.getElementById("listSub").textContent = activePhase === "ALL" ? "ทั้งทริป" : activePhase;

    if(filtered.length === 0){
      listEl.innerHTML = '<div class="empty">ยังไม่มีรายการ</div>';
      return;
    }

    const sorted = filtered.slice().reverse();
    listEl.innerHTML = sorted.map(r => `
      <div class="entry">
        <div class="entry-left">
          <div class="entry-cat">${r.item || r.category || "-"}</div>
          <div class="entry-meta">${r.date || ""}${r.category ? " · " + r.category : ""}${r.note ? " · " + r.note : ""}</div>
        </div>
        <div class="entry-amount ${r.type}">${r.type === "income" ? "+" : "-"}${fmt(r.amount)}</div>
      </div>
    `).join("");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if(GAS_URL.includes("PASTE_YOUR")){
      statusEl.textContent = "กรุณาวาง Google Apps Script URL ในโค้ดก่อนใช้งาน";
      return;
    }
    const categoryValue = currentType === "expense" ? collectExpenseCategories() : categoryTextEl.value;
    if(currentType === "expense" && !categoryValue){
      statusEl.textContent = "กรุณาเลือกอย่างน้อย 1 หมวดหมู่";
      return;
    }
    const payload = {
      date: document.getElementById("date").value,
      phase: document.getElementById("phase").value,
      type: currentType,
      item: document.getElementById("itemName").value,
      category: categoryValue,
      amount: document.getElementById("amount").value,
      note: document.getElementById("note").value
    };
    statusEl.textContent = "กำลังบันทึก...";
    try{
      await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });
      statusEl.textContent = "บันทึกแล้ว";
      form.reset();
      categoryTreeEl.querySelectorAll(".cat-subs").forEach(el => el.classList.remove("open"));
      document.getElementById("date").valueAsDate = new Date();
      updateCategoryFieldVisibility();
      setTimeout(() => { statusEl.textContent = ""; loadEntries(); }, 600);
    }catch(err){
      statusEl.textContent = "บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง";
    }
  });

  loadEntries();

  if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
